name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_CUSTOM_DOMAIN: "true"
          GITHUB_PAGES_REPO: web_dmt_hau_viet
          NEXT_PUBLIC_LEAD_WEBHOOK_URL: ""
          NEXT_PUBLIC_PROJECTS_API_URL: ""
          NEXT_PUBLIC_PROJECT_ADMIN_TOKEN: ""

      - name: Add GitHub Pages marker
        run: touch out/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
